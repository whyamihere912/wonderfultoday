name: Prettier Format

on: [push]

permissions:
  contents: write

jobs:
  format:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - run: npm install
      - run: npx prettier --write .

      - name: Commit changes
        uses: stefanzweifel/git-auto-commit-action@v5
